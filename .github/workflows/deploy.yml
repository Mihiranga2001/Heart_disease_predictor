name: CD - Deploy Flask ML App

on:
  push:
    branches:
      - main

env:
  IMAGE_NAME: heart_disease_app
  CONTAINER_NAME: heart-disease-app

jobs:
  build-push-deploy:
    name: Build, Push and Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:latest
            ${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Deploy to EC2 using SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          command_timeout: 10m
          script: |
            sudo docker pull ${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:latest

            sudo docker stop ${{ env.CONTAINER_NAME }} || true
            sudo docker rm ${{ env.CONTAINER_NAME }} || true

            sudo docker run -d \
              --name ${{ env.CONTAINER_NAME }} \
              --restart always \
              -p 127.0.0.1:5000:5000 \
              ${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:latest

            sudo docker ps

            echo "Waiting for Flask app to start..."

            for i in {1..10}; do
              if curl -fsS http://127.0.0.1:5000; then
                echo "Flask app is running successfully"
                break
              fi

              echo "App not ready yet. Retrying in 5 seconds..."
              sleep 5

              if [ "$i" -eq 10 ]; then
                echo "App health check failed. Showing Docker logs:"
                sudo docker logs ${{ env.CONTAINER_NAME }}
                exit 1
              fi
            done

            sudo nginx -t
            sudo systemctl reload nginx